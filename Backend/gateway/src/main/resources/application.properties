server.port=9090
spring.application.name=api-gateway

# Configuración de logs
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.web=DEBUG

# NOTA: Las rutas del API Gateway se configuran mediante código Java en
# com.apigateway.gateway.GatewayConfig para garantizar su correcta inicialización y compatibilidad
# con Spring Boot 4.0.x y Spring Cloud 2025.x (webmvc).